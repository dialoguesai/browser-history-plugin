<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Extension Settings</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 1rem;
            max-width: 400px;
        }

        label {
            display: block;
            margin-top: 1rem;
        }

        input,
        button,
        textarea {
            width: 100%;
            box-sizing: border-box;
        }

        textarea {
            height: 4em;
        }
    </style>
</head>

<body>
    <h1>Settings</h1>

    <label>
        Supabase URL:
        <input id="supabaseUrl" type="text" placeholder="https://xyz.supabase.co" />
    </label>

    <label>
        Supabase Anon Key:
        <input id="anonKey" type="text" placeholder="public-anon-key" />
    </label>

    <label>
        Device Name:
        <input id="deviceName" type="text" placeholder="e.g. My Laptop" />
    </label>

    <label style="display:flex; align-items:center; gap:0.5rem; margin-top:1rem;">
        <input id="showStarButton" type="checkbox" />
        <span>Show on-page Star button</span>
    </label>

    <label>
        Skip Domains (one per line — hostname or full URL; all paths on that host are skipped):
        <textarea id="skipList" placeholder="e.g. airtable.com or https://app.example.com/dashboard"></textarea>
    </label>

    <button id="save">Save</button>
    <p id="status" style="color: green; visibility: hidden;">Saved!</p>

    <h2>Attach Dialogues</h2>
    <p style="font-size: 0.9em; color: #555;">Connect this plugin to your Dialogues account to also write visits to your Dialogues database (in addition to your own storage above).</p>
    <label>
        Dialogues URL (frontend + Control Plane base):
        <input id="dialoguesUrl" type="text" placeholder="https://cp.logu3s.com" />
    </label>
    <label>
        Dialogues Client Secret (for browser-plugin app exchange):
        <input id="dialoguesClientSecret" type="password" placeholder="cas_..." autocomplete="off" />
    </label>
    <div style="margin-top: 0.5rem; display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
        <button id="attachDialogues" style="width: 220px; display: inline-flex; justify-content: center; align-items: center; gap: 0.4rem;">
            <img
                src="https://cp.logu3s.com/static/brand/dialogues_logo_icon.png"
                alt=""
                aria-hidden="true"
                width="16"
                height="16"
                style="background: #fff; border-radius: 4px; padding: 2px; border: 1px solid #d1d5db;"
            />
            Attach Dialogues
        </button>
        <button id="detachDialogues" style="width: 220px; display: none;">Detach</button>
        <span id="attachStatus" style="font-size: 0.9em;"></span>
    </div>
    <div id="debugInfo" style="margin-top: 0.5rem; font-size: 0.8em; color: #666; font-family: monospace; word-break: break-all;"></div>
    <div id="scriptStatus" style="margin-top: 0.5rem; padding: 0.5rem; background: #f0f0f0; border-radius: 4px; font-size: 0.85em;">
        <strong>Script status:</strong> <span id="scriptStatusText">Loading...</span>
    </div>

    <h2>Starred Websites</h2>
    <div id="starredWebsites"></div>

    <script src="options.js"></script>
</body>

</html>
